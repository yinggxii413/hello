name: Earnings Monitor

on:
  schedule:
    - cron: "30 12 * * *"
    - cron: "30 20 * * *"
    - cron: "30 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run earnings monitor
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EARNINGS_WEBHOOK: ${{ secrets.EARNINGS_WEBHOOK }}
        run: python earnings_monitor.py

      - name: Save earnings state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add earnings_state.json
          git commit -m "update earnings state" || echo "No changes"
          git push
