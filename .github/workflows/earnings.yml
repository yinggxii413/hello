name: Earnings Monitor

on:
  schedule:
    - cron: "30 12 * * *"   # UTC 12:30 = 北京 20:30 (覆盖美股盘前)
    - cron: "30 20 * * *"   # UTC 20:30 = 北京 04:30 (覆盖美股盘后)
    - cron: "30 22 * * *"   # UTC 22:30 = 北京 06:30 (覆盖美股盘后晚批)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run earnings monitor
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EARNINGS_WEBHOOK: ${{ secrets.EARNINGS_WEBHOOK }}
          # ↓↓↓ 测试用：回看30天，能立刻抓到近一个月已发财报的票。看完效果请删掉这一行(恢复默认只看最近3天)
          REPORTED_LOOKBACK: "30"
        run: python earnings_monitor.py

      - name: Save earnings state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add earnings_state.json
          git commit -m "update earnings state" || echo "No changes"
          git push
