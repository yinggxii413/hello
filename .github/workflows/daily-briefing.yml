name: Daily AI Infra Briefing

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and post briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.BRIEFING_WEBHOOK_URL }}
        run: python generate_and_post.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add briefing_state.json
          git diff --staged --quiet && echo "state 无变化，跳过" && exit 0
          git commit -m "update briefing state"
          for i in 1 2 3; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" \
              && git push && echo "已回写 state" && exit 0
            echo "push 第 $i 次冲突，5 秒后重试…"; sleep 5
          done
          echo "::warning::state 回写失败，简报已照常发送"
          exit 0
