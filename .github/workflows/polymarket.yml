name: Polymarket Monitor

on:
  schedule:
    - cron: "0 10 * * *"   # UTC 10:00 = 北京 18:00（每天一次）
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run Polymarket monitor
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          POLY_STOCKS_WEBHOOK: ${{ secrets.POLY_STOCKS_WEBHOOK }}      # 股票频道
          POLY_WORLDCUP_WEBHOOK: ${{ secrets.POLY_WORLDCUP_WEBHOOK }}  # 世界杯频道
          POLY_TRUMP_WEBHOOK: ${{ secrets.POLY_TRUMP_WEBHOOK }}        # 特朗普频道
          # POLY_TOP_N: "10"     # 可选：每话题取前几条
        run: python polymarket_monitor.py
